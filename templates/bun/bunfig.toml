# bunfig.toml - Bun configuration file for Ink CLI development
# https://bun.sh/docs/runtime/bunfig

[install]
# Auto-install dependencies on import
autoInstall = true

# Set default registry
registry = "https://registry.npmjs.org/"

# Set node_modules folder
node_modules = "node_modules"

# Cache directory
cache = "node_modules/.cache/bun"

[test]
# Test runner configuration for Ink
# Coverage reporting
# coverage = true

# Run tests in parallel
parallel = true

# Watch mode for TDD
# watch = true

[dev]
# Hot reload for CLI development (important for Ink)
hot = true

# Disable auto-start for interactive CLIs
# Interactive CLIs don't need a dev server
autoRun = false

[build]
# Build output directory
outdir = "dist"

# Minification for production
minify = true

# Source maps for debugging
sourcemap = true

# Target environment
target = "node"

[package]
# Package.json field order
fields = ["name", "version", "description"]

[run]
# Node.js compatibility mode
compat = "node"

loader = {
  ".css" = "css",
".js" = "jsx", ".ts" = "tsx",
".tsx" = "tsx",
".json" = "json",
# Loader configuration for file types

}

".txt" = "text"
env = {
  # Environment variables

}NODE_ENV = "development"
